<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Manage Plans</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        .input-field { background: #0a0a0a; border: 1px solid #222; border-radius: 1rem; padding: 12px; width: 100%; outline: none; transition: 0.3s; }
        .input-field:focus { border-color: #ef4444; }
        .plan-item { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1.5rem; transition: 0.3s; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: none; items-center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="p-6 pb-24">

    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-xl font-black uppercase italic tracking-tighter">Manage Plans</h1>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Premium & Pricing</p>
        </div>
        <button onclick="openModal()" class="w-12 h-12 bg-red-600 rounded-2xl flex items-center justify-center shadow-lg shadow-red-600/20">
            <i class="fas fa-plus"></i>
        </button>
    </div>

    <div id="plansContainer" class="space-y-4 text-sm">
        <p class="text-center text-gray-700 py-10 italic">Fetching plans from database...</p>
    </div>

    <div id="planModal" class="modal">
        <div class="bg-[#111] w-full max-w-sm rounded-[2.5rem] p-8 border border-white/5">
            <h2 id="modalTitle" class="text-lg font-black uppercase italic mb-6">Add New Plan</h2>
            
            <div class="space-y-4">
                <input type="text" id="planName" placeholder="Plan Name (e.g. WEEKLY)" class="input-field text-xs uppercase font-bold">
                <input type="text" id="duration" placeholder="Duration (e.g. 7 Days Access)" class="input-field text-xs">
                <input type="number" id="price" placeholder="Price (MMK)" class="input-field text-xs">
                <input type="text" id="kpay" placeholder="KPay Number" class="input-field text-xs">
                <input type="text" id="wave" placeholder="Wave Number" class="input-field text-xs">
                <textarea id="desc" placeholder="Description" class="input-field text-xs h-20"></textarea>
            </div>

            <div class="flex gap-3 mt-8">
                <button onclick="closeModal()" class="flex-1 py-4 text-[10px] font-black uppercase text-gray-500">Cancel</button>
                <button id="saveBtn" onclick="savePlan()" class="flex-1 bg-red-600 py-4 rounded-2xl text-[10px] font-black uppercase italic tracking-widest shadow-xl shadow-red-600/20">Save Plan</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://tzqocixgnvyecjravvsr.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6cW9jaXhnbnZ5ZWNqcmF2dnNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTU2NDksImV4cCI6MjA4NzI3MTY0OX0._WWqrZkvQRijutrCnLCbWoWM4Eid6S_o_J7DsfkXeT8';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let editingId = null;

        async function fetchPlans() {
            const { data, error } = await _supabase.from('premium').select('*').order('id', { ascending: true });
            
            const container = document.getElementById('plansContainer');
            if (data && data.length > 0) {
                container.innerHTML = data.map(p => `
                    <div class="plan-item p-5">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="font-black italic uppercase text-red-600">${p.plan_name}</h3>
                                <p class="text-[10px] text-gray-400 uppercase font-bold tracking-tighter">${p.duration}</p>
                            </div>
                            <p class="font-black text-lg">${p.price.toLocaleString()} <span class="text-[9px] text-gray-500 uppercase">MMK</span></p>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mb-4 text-[10px] font-mono text-gray-500 bg-black/50 p-3 rounded-xl">
                            <div>K: ${p.kpay_no}</div>
                            <div>W: ${p.wave_no}</div>
                        </div>
                        <div class="flex gap-4">
                            <button onclick="editPlan(${JSON.stringify(p).replace(/"/g, '&quot;')})" class="text-[10px] font-black uppercase text-blue-500">Edit</button>
                            <button onclick="deletePlan(${p.id})" class="text-[10px] font-black uppercase text-gray-600">Delete</button>
                        </div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<p class="text-center text-gray-800 py-10">No plans found.</p>';
            }
        }

        function openModal() {
            editingId = null;
            document.getElementById('modalTitle').innerText = "Add New Plan";
            document.getElementById('planName').value = "";
            document.getElementById('duration').value = "";
            document.getElementById('price').value = "";
            document.getElementById('kpay').value = "";
            document.getElementById('wave').value = "";
            document.getElementById('desc').value = "";
            document.getElementById('planModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('planModal').style.display = 'none';
        }

        function editPlan(p) {
            editingId = p.id;
            document.getElementById('modalTitle').innerText = "Edit Plan";
            document.getElementById('planName').value = p.plan_name;
            document.getElementById('duration').value = p.duration;
            document.getElementById('price').value = p.price;
            document.getElementById('kpay').value = p.kpay_no;
            document.getElementById('wave').value = p.wave_no;
            document.getElementById('desc').value = p.description;
            document.getElementById('planModal').style.display = 'flex';
        }

        async function savePlan() {
            const data = {
                plan_name: document.getElementById('planName').value,
                duration: document.getElementById('duration').value,
                price: parseInt(document.getElementById('price').value),
                kpay_no: document.getElementById('kpay').value,
                wave_no: document.getElementById('wave').value,
                description: document.getElementById('desc').value
            };

            if (editingId) {
                await _supabase.from('premium').update(data).eq('id', editingId);
            } else {
                await _supabase.from('premium').insert([data]);
            }

            closeModal();
            fetchPlans();
        }

        async function deletePlan(id) {
            if (confirm("ဒီ Plan ကို ဖျက်မှာ သေချာပါသလား?")) {
                await _supabase.from('premium').delete().eq('id', id);
                fetchPlans();
            }
        }

        fetchPlans();
    </script>
</body>
</html>
