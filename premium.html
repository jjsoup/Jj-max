<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Plans</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        .plan-card { border: 1px solid #222; transition: 0.3s; background: #0a0a0a; position: relative; overflow: hidden; }
        /* VIP ရှိနေရင် နှိပ်လို့မရအောင် လုပ်ထားသည့် style */
        .plan-card.active-plan { border-color: #22c55e; background: #051a05; opacity: 0.8; }
        .plan-card.selected { border-color: #ef4444; background: #1a0505; }
        .active-badge { position: absolute; top: 0; right: 0; background: #22c55e; color: white; font-size: 8px; font-weight: 900; padding: 4px 12px; border-bottom-left-radius: 12px; text-transform: uppercase; }
        .hidden-step { display: none; }
    </style>
</head>
<body class="p-5 pb-24">

    <div class="flex items-center gap-4 mb-8">
        <i class="fas fa-arrow-left text-xl" onclick="window.location.href='index.html'"></i>
        <h1 class="text-xl font-black uppercase italic tracking-tighter text-red-600">Membership</h1>
    </div>

    <div id="step1">
        <h2 class="text-[10px] font-black text-gray-500 uppercase mb-6 tracking-[0.2em]">အဆင့် ၁ - Plan ရွေးချယ်ပါ</h2>
        <div id="plansContainer" class="space-y-4">
            <p class="text-center text-gray-700 py-10 italic">Loading VIP plans...</p>
        </div>
    </div>

    <div id="step2" class="hidden-step mt-10">
        <h2 class="text-[10px] font-black text-gray-500 uppercase mb-6 tracking-[0.2em]">အဆင့် ၂ - ငွေလွှဲပြီး အချက်အလက်ဖြည့်ပါ</h2>
        
        <div class="bg-gray-900/40 p-6 rounded-[2.5rem] border border-white/5 space-y-6">
            <table class="w-full text-sm">
                <tr class="border-b border-white/5">
                    <td class="py-4">
                        <div class="flex items-center gap-4">
                            <img src="kpay.jpeg" class="w-10 h-10 rounded-xl object-cover border border-white/10" onerror="this.src='https://upload.wikimedia.org/wikipedia/en/thumb/0/07/Kbz_pay_logo.png/1200px-Kbz_pay_logo.png'">
                            <div><p class="font-black italic">KPay</p><p id="kpayNo" class="text-xs text-gray-400 font-mono"></p></div>
                        </div>
                    </td>
                    <td class="text-right"><button onclick="copyText('kpayNo')" class="text-[10px] font-black text-blue-500 uppercase bg-blue-500/10 px-3 py-1.5 rounded-lg">Copy</button></td>
                </tr>
                <tr>
                    <td class="py-4">
                        <div class="flex items-center gap-4">
                            <img src="wave.jpeg" class="w-10 h-10 rounded-xl object-cover border border-white/10" onerror="this.src='https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR0YdC7m6t0X-w-H7nQ6-M3X_iR18oX_mUaLg&s'">
                            <div><p class="font-black italic">Wave Pay</p><p id="waveNo" class="text-xs text-gray-400 font-mono"></p></div>
                        </div>
                    </td>
                    <td class="text-right"><button onclick="copyText('waveNo')" class="text-[10px] font-black text-blue-500 uppercase bg-blue-500/10 px-3 py-1.5 rounded-lg">Copy</button></td>
                </tr>
            </table>

            <div class="pt-6 border-t border-white/5 text-center">
                <label class="text-[10px] font-black text-gray-400 uppercase block mb-3 tracking-widest">ငွေလွှဲနံပါတ် (နောက်ဆုံး ၆ လုံး)</label>
                <input type="number" id="tidInput" placeholder="000000" 
                    class="w-full bg-black/50 border border-gray-800 rounded-2xl py-5 px-4 text-center text-2xl font-black tracking-[0.6em] focus:border-red-600 outline-none text-red-600">
                <p class="text-[9px] text-gray-600 mt-3 uppercase font-bold italic">Transaction ID ခြောက်လုံးကိုသာ ရိုက်ထည့်ပါ</p>
            </div>
        </div>
    </div>

    <div class="fixed bottom-6 left-0 right-0 px-6">
        <button id="mainBtn" disabled class="w-full bg-gray-900 text-gray-600 py-5 rounded-[1.8rem] font-black uppercase tracking-widest transition-all italic text-sm">
            Plan အရင်ရွေးချယ်ပါ
        </button>
    </div>

    <script>
        const SB_URL = 'https://tzqocixgnvyecjravvsr.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6cW9jaXhnbnZ5ZWNqcmF2dnNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTU2NDksImV4cCI6MjA4NzI3MTY0OX0._WWqrZkvQRijutrCnLCbWoWM4Eid6S_o_J7DsfkXeT8';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let selectedPlanData = null;
        let currentUserId = null;
        let isVipActive = false;

        async function init() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href = 'login.html'; return; }
            currentUserId = user.id;

            // ၁။ နောက်ဆုံးတိုင်ပင်ထားသည့်အတိုင်း expiry_date ကို စစ်ဆေးခြင်း
            const { data: profile } = await _supabase.from('profiles').select('expiry_date').eq('id', currentUserId).maybeSingle();
            
            const now = new Date();
            if (profile && profile.expiry_date) {
                const expiry = new Date(profile.expiry_date);
                isVipActive = expiry > now; // ရက်စွဲမကျော်သေးလျှင် True
            }

            const { data: plans, error } = await _supabase.from('premium').select('*').order('price', { ascending: true });
            
            if (!error) {
                const container = document.getElementById('plansContainer');
                container.innerHTML = plans.map(p => {
                    return `
                    <div class="plan-card p-6 rounded-[2rem] flex justify-between items-center cursor-pointer ${isVipActive ? 'active-plan' : ''}" 
                         onclick="selectPlan(${JSON.stringify(p).replace(/"/g, '&quot;')}, this)">
                        ${isVipActive ? '<div class="active-badge"><i class="fas fa-check-circle mr-1"></i> Active VIP</div>' : ''}
                        <div>
                            <h3 class="font-black text-lg uppercase italic tracking-tighter text-white">${p.duration}</h3>
                            <p class="text-gray-500 text-[9px] font-bold uppercase tracking-wider">${p.description}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xl font-black ${isVipActive ? 'text-gray-700' : 'text-red-600'} italic">${p.price.toLocaleString()} <span class="text-[9px] text-white not-italic">MMK</span></p>
                        </div>
                    </div>
                `}).join('');
            }
        }

        function selectPlan(plan, el) {
            // VIP ရှိနေရင်လည်း ထပ်ဝယ်လို့ရအောင် (Plan တိုးချင်သူများအတွက်) active-plan logic ကို နှိပ်ခွင့်ပေးထားနိုင်သည်
            // သို့သော် Admin အစကတည်းက ပိတ်ချင်လျှင် if(isVipActive) return; ကို သုံးနိုင်သည်
            
            selectedPlanData = plan;
            document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            
            document.getElementById('kpayNo').innerText = plan.kpay_no;
            document.getElementById('waveNo').innerText = plan.wave_no;
            document.getElementById('step2').classList.remove('hidden-step');
            
            const btn = document.getElementById('mainBtn');
            btn.disabled = false;
            btn.className = "w-full bg-red-600 text-white py-5 rounded-[1.8rem] font-black uppercase tracking-widest transition-all italic text-sm shadow-lg shadow-red-600/20";
            btn.innerText = isVipActive ? "VIP သက်တမ်းတိုးမည်" : "အတည်ပြုပြီး ပေးပို့မည်";
            
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        async function submitRequest() {
            const tid = document.getElementById('tidInput').value;
            if (tid.length < 6) {
                alert("ငွေလွှဲနံပါတ် နောက်ဆုံး ၆ လုံးကို မှန်အောင်ရိုက်ပါ။");
                return;
            }

            const btn = document.getElementById('mainBtn');
            btn.disabled = true;
            btn.innerText = "Processing...";

            const { error } = await _supabase.from('payments').insert([{
                user_id: currentUserId,
                plan_name: selectedPlanData.plan_name,
                amount: selectedPlanData.price,
                transaction_id: tid,
                status: 'pending'
            }]);

            if (!error) {
                alert("ငွေလွှဲမှု အချက်အလက် ပေးပို့ပြီးပါပြီ။ Admin မှ အတည်ပြုပေးပါလိမ့်မည်။");
                window.location.href = 'index.html';
            } else {
                alert("Error: " + error.message);
                btn.disabled = false;
                btn.innerText = "ပြန်လည်ပေးပို့မည်";
            }
        }

        function copyText(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            alert("ကော်ပီကူးယူပြီးပါပြီ");
        }

        document.getElementById('mainBtn').onclick = submitRequest;
        init();
    </script>
</body>
</html>
