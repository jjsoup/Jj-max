<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - JJ CINEMA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; padding-bottom: 90px; }
        .glass-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); }
        .active-glow { box-shadow: 0 0 15px rgba(34, 197, 94, 0.2); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 9999; display: none; align-items: center; justify-content: center; }
        .dialog-box { width: 85%; max-width: 320px; background: #111; border-radius: 2rem; border: 1px solid #222; overflow: hidden; }
    </style>
</head>
<body>

    <div id="logoutDialog" class="overlay">
        <div class="dialog-box p-8 text-center animate-in fade-in zoom-in duration-300">
            <div class="w-16 h-16 bg-red-600/10 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                <i class="fas fa-sign-out-alt"></i>
            </div>
            <h2 class="text-lg font-black uppercase italic tracking-tighter text-white mb-2">Logout လုပ်မှာလား?</h2>
            <p class="text-[11px] text-gray-500 mb-6 font-medium leading-relaxed">Account ထဲကနေ ထွက်ခွာတော့မှာ သေချာပါသလားဗျာ။</p>
            <div class="flex flex-col gap-3">
                <button onclick="confirmLogout()" class="w-full bg-red-600 text-white py-3.5 rounded-2xl font-black text-[10px] uppercase tracking-widest">Logout လုပ်မည်</button>
                <button onclick="closeLogoutDialog()" class="w-full py-2 text-gray-400 text-[9px] uppercase font-black tracking-widest">မလုပ်တော့ပါ</button>
            </div>
        </div>
    </div>

    <div class="p-4 flex items-center gap-4 border-b border-white/5 sticky top-0 bg-black/95 backdrop-blur-md z-50">
        <button onclick="history.back()" class="p-2 bg-gray-900 rounded-full active:scale-90 transition">
            <i class="fas fa-arrow-left text-red-600"></i>
        </button>
        <h1 class="text-xl font-black italic uppercase text-red-600 tracking-tighter">Profile</h1>
    </div>

    <div class="p-6 space-y-6">
        
        <div class="glass-box rounded-[2.5rem] p-8 text-center relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4">
                <i class="fas fa-crown text-yellow-500/20 text-4xl"></i>
            </div>
            <div class="w-24 h-24 bg-gradient-to-tr from-red-600 to-red-400 rounded-full mx-auto flex items-center justify-center text-4xl text-white font-bold shadow-lg shadow-red-600/20 mb-4">
                <i class="fas fa-user"></i>
            </div>
            <h2 id="userEmail" class="text-base font-black truncate text-gray-100">Loading...</h2>
            <span class="inline-block mt-2 px-4 py-1 bg-white/5 rounded-full text-[9px] font-black text-gray-500 uppercase tracking-[0.2em]">Member ID Verified</span>
        </div>

        <div class="glass-box rounded-3xl p-6 border border-white/5 space-y-4">
            <div class="flex justify-between items-center">
                <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Subscription</span>
                <span id="subStatus" class="px-3 py-1 bg-red-600/10 text-red-500 rounded-full font-black uppercase text-[9px] tracking-widest">Inactive</span>
            </div>
            <div class="flex justify-between items-center pt-2 border-t border-white/5">
                <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Expiry Date</span>
                <span id="expiryDate" class="text-xs font-mono font-bold text-gray-300">- / - / -</span>
            </div>
        </div>

        <div class="space-y-4 pt-4">
            <button onclick="window.location.href='premium.html'" class="w-full bg-white text-black font-black py-4 rounded-2xl text-[10px] uppercase tracking-widest active:scale-95 transition shadow-xl shadow-white/5">
                <i class="fas fa-gem mr-2"></i> Renew / Upgrade Plan
            </button>
            <button onclick="openLogoutDialog()" class="w-full bg-red-600/10 text-red-600 font-black py-4 rounded-2xl text-[10px] uppercase tracking-widest active:scale-95 transition border border-red-600/10">
                <i class="fas fa-sign-out-alt mr-2"></i> Logout
            </button>
        </div>

    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-black/95 border-t border-white/5 px-6 py-4 flex justify-between items-center z-50">
        <div onclick="window.location.href='index.html'" class="flex flex-col items-center gap-1 text-gray-500"><i class="fas fa-home text-xl"></i><span class="text-[8px] font-black uppercase">Home</span></div>
        <div onclick="window.location.href='fav.html'" class="flex flex-col items-center gap-1 text-gray-500"><i class="far fa-star text-xl"></i><span class="text-[8px] font-black uppercase">Fav</span></div>
        <div onclick="window.location.href='premium.html'" class="flex flex-col items-center gap-1 text-gray-500"><i class="fas fa-gem text-xl"></i><span class="text-[8px] font-black uppercase">Sub</span></div>
        <div onclick="window.location.href='admininfo.html'" class="flex flex-col items-center gap-1 text-gray-500"><i class="fas fa-headset text-xl"></i><span class="text-[8px] font-black uppercase">Contact</span></div>
        <div onclick="window.location.href='profile.html'" class="flex flex-col items-center gap-1 text-red-600"><i class="fas fa-user text-xl"></i><span class="text-[8px] font-black uppercase">Profile</span></div>
    </div>

    <script>
        const SB_URL = 'https://tzqocixgnvyecjravvsr.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6cW9jaXhnbnZ5ZWNqcmF2dnNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTU2NDksImV4cCI6MjA4NzI3MTY0OX0._WWqrZkvQRijutrCnLCbWoWM4Eid6S_o_J7DsfkXeT8';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function loadProfile() {
            const { data: { user } } = await _supabase.auth.getUser();

            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('userEmail').innerText = user.email;

            // Profile Data နဲ့ Expiry Date စစ်ဆေးခြင်း
            const { data: profile } = await _supabase
                .from('profiles')
                .select('*')
                .eq('id', user.id)
                .single();

            if (profile && profile.expiry_date) {
                const now = new Date();
                const expiry = new Date(profile.expiry_date);
                
                // လက်ရှိအချိန်ထက် ကျော်မကျော် စစ်ဆေးခြင်း
                if (expiry > now) {
                    const statusEl = document.getElementById('subStatus');
                    statusEl.innerText = "Active VIP";
                    statusEl.className = "px-3 py-1 bg-green-600/10 text-green-500 rounded-full font-black uppercase text-[9px] tracking-widest active-glow";
                    
                    document.getElementById('expiryDate').innerText = expiry.toLocaleDateString('en-GB', {
                        day: '2-digit', month: 'short', year: 'numeric'
                    });
                } else {
                    document.getElementById('subStatus').innerText = "Expired";
                    document.getElementById('expiryDate').innerText = "Plan has ended";
                }
            }
        }

        // Dialog Functions
        function openLogoutDialog() { document.getElementById('logoutDialog').style.display = 'flex'; }
        function closeLogoutDialog() { document.getElementById('logoutDialog').style.display = 'none'; }
        
        async function confirmLogout() {
            await _supabase.auth.signOut();
            window.location.href = 'login.html';
        }

        loadProfile();
    </script>
</body>
</html>
