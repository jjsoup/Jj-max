<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: #e5e5e5; font-family: sans-serif; overflow-x: hidden; }
        /* Scroll လုပ်လို့ရအောင် အဓိကပြင်ဆင်ချက် */
        #notiList { width: 100%; display: flex; flex-direction: column; }
        
        .msg-card { 
            background: #0f0f0f; 
            border-bottom: 1px solid #1a1a1a; 
            padding: 16px; 
            transition: 0.2s;
            cursor: pointer;
        }
        .unread { 
            background: #150a0a; 
            border-left: 4px solid #ef4444; 
        }
        .msg-card:active { background: #1a1a1a; }
        
        /* Push Alert */
        #pushAlert {
            position: fixed; top: -100px; left: 10px; right: 10px;
            background: #ef4444; color: white; padding: 12px;
            border-radius: 12px; z-index: 10000; transition: 0.5s ease-in-out;
            display: flex; align-items: center; gap: 10px;
        }
        #pushAlert.show { top: 15px; }
    </style>
</head>
<body class="min-h-screen">

    <div id="pushAlert" class="shadow-2xl">
        <i class="fas fa-bell"></i>
        <div class="truncate text-sm font-bold" id="alertTxt">စာအသစ် ရောက်ရှိနေပါသည်။</div>
    </div>

    <div class="sticky top-0 bg-black/95 backdrop-blur-md p-5 border-b border-[#1a1a1a] flex items-center gap-4 z-50">
        <i class="fas fa-arrow-left text-yellow-500" onclick="window.location.href='index.html'"></i>
        <h1 class="text-lg font-black italic uppercase tracking-tighter text-red-600">Notifications</h1>
    </div>

    <div id="notiList" class="pb-32">
        <div class="flex justify-center items-center h-[50vh]">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-red-600"></div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-black/95 border-t border-white/5 px-10 py-5 flex justify-between items-center z-50 shadow-[0_-10px_20px_rgba(0,0,0,0.5)]">
        <i class="fas fa-home text-gray-600 text-xl" onclick="window.location.href='index.html'"></i>
        <i class="fas fa-heart text-gray-600 text-xl" onclick="window.location.href='fav.html'"></i>
        <i class="fas fa-envelope text-red-600 text-xl"></i>
        <i class="far fa-user text-gray-600 text-xl" onclick="window.location.href='profile.html'"></i>
    </div>

    <script>
        const SB_URL = 'https://tzqocixgnvyecjravvsr.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6cW9jaXhnbnZ5ZWNqcmF2dnNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTU2NDksImV4cCI6MjA4NzI3MTY0OX0._WWqrZkvQRijutrCnLCbWoWM4Eid6S_o_J7DsfkXeT8';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentUserId = null;

        async function init() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href = 'login.html'; return; }
            currentUserId = user.id;

            fetchNotifications(); 
            listenRealtime();    
        }

        async function fetchNotifications() {
            const { data, error } = await _supabase
                .from('notifications')
                .select('*')
                .or(`user_id.eq.${currentUserId},user_id.is.null`)
                .order('created_at', { ascending: false });

            const list = document.getElementById('notiList');
            if (data && data.length > 0) {
                list.innerHTML = data.map(n => `
                    <div class="msg-card ${n.is_read ? '' : 'unread'}" onclick="markAsRead('${n.id}')">
                        <div class="flex justify-between items-baseline mb-2">
                            <h3 class="text-[13px] font-black italic uppercase tracking-tight ${n.is_read ? 'text-gray-500' : 'text-white'}">
                                ${n.user_id === null ? '<i class="fas fa-bullhorn text-blue-500 mr-2"></i>' : ''} ${n.title}
                            </h3>
                            <span class="text-[9px] text-gray-700 font-bold">${new Date(n.created_at).toLocaleDateString()}</span>
                        </div>
                        <p class="text-[12px] text-gray-400 leading-relaxed font-medium">${n.message}</p>
                    </div>
                `).join('');
            } else {
                list.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-[70vh] text-gray-800">
                        <i class="fas fa-envelope-open text-6xl mb-4"></i>
                        <p class="text-[10px] font-black uppercase tracking-[0.3em]">No Messages Yet</p>
                    </div>`;
            }
        }

        function listenRealtime() {
            _supabase.channel('inbox-realtime')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications' }, payload => {
                    if (payload.new.user_id === currentUserId || payload.new.user_id === null) {
                        showPushAlert(payload.new.title);
                        fetchNotifications();
                    }
                }).subscribe();
        }

        function showPushAlert(txt) {
            const alert = document.getElementById('pushAlert');
            document.getElementById('alertTxt').innerText = txt;
            alert.classList.add('show');
            setTimeout(() => alert.classList.remove('show'), 5000);
        }

        async function markAsRead(id) {
            await _supabase.from('notifications').update({ is_read: true }).eq('id', id);
            fetchNotifications();
        }

        init();
    </script>
</body>
</html>
